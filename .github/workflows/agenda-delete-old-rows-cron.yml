name: Agenda - Delete Old Rows Cron

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  delete-old-rows:
    runs-on: ubuntu-latest
    steps:
      - name: Call delete old rows endpoint
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          AGENDA_SYNC_SECRET: ${{ secrets.AGENDA_SYNC_SECRET }}
        run: |
          set -euo pipefail

          : "${API_BASE_URL:?Missing required secret: API_BASE_URL}"
          : "${AGENDA_SYNC_SECRET:?Missing required secret: AGENDA_SYNC_SECRET}"

          REQUEST_METHOD="DELETE"
          REQUEST_URL="${API_BASE_URL%/}/dates/delete-old-rows"
          REQUEST_PATH="$(node -p "new URL(process.argv[1]).pathname" "$REQUEST_URL")"
          REQUEST_TIMESTAMP="$(date +%s%3N)"
          SIGNATURE_PAYLOAD="${REQUEST_METHOD}:${REQUEST_PATH}:${REQUEST_TIMESTAMP}"
          REQUEST_SIGNATURE="$(printf '%s' "$SIGNATURE_PAYLOAD" | openssl dgst -sha256 -hmac "$AGENDA_SYNC_SECRET" -r | awk '{print $1}')"

          curl --fail --show-error --silent --request "$REQUEST_METHOD" \
            --url "$REQUEST_URL" \
            --header "x-agenda-sync-timestamp: $REQUEST_TIMESTAMP" \
            --header "x-agenda-sync-signature: $REQUEST_SIGNATURE"
